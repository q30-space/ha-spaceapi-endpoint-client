# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: "daily"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
    ignore:
      # Owned by .github/workflows/bump-ha.yml — these two must always move
      # in lockstep (the plugin's Requires-Dist pins a single HA version),
      # and dependabot bumps them independently which breaks CI.
      - dependency-name: "homeassistant"
      - dependency-name: "pytest-homeassistant-custom-component"