# The contents of this file is based on https://github.com/home-assistant/core/blob/dev/pyproject.toml

target-version = "py313"

[lint]
select = [
    "ALL",
]

ignore = [
    "ANN401", # Dynamically typed expressions (typing.Any) are disallowed
    "D203", # no-blank-line-before-class (incompatible with formatter)
    "D212", # multi-line-summary-first-line (incompatible with formatter)
    "COM812", # incompatible with formatter
    "ISC001", # incompatible with formatter
]

[lint.flake8-pytest-style]
fixture-parentheses = false

[lint.per-file-ignores]
"tests/**" = [
    "ANN",      # type annotations not enforced in tests
    "ARG001",   # unused fixture parameters are normal
    "D",        # docstrings not required in tests
    "PLR2004",  # magic values are fine in assertions
    "S101",     # assert is the test idiom
    "S105",     # hardcoded "passwords" are fixture data
    "S106",     # same
    "PLC0415",  # local imports are fine in test helpers
    "TC002",    # don't care about TYPE_CHECKING imports in tests
    "SLF001",   # tests may reach into script/module internals
]
"scripts/**" = [
    "D",        # CLI helpers don't need full docstring coverage
    "T201",     # print is the CLI's user interface
    "S310",     # hardcoded pypi.org URLs are safe
]

[lint.pyupgrade]
keep-runtime-typing = true

[lint.mccabe]
max-complexity = 25
